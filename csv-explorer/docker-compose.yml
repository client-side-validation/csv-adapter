services:
  indexer:
    build:
      context: .
      target: indexer
    command: ["csv-explorer-indexer", "start"]
    volumes:
      - ./data:/data
    environment:
      - DATABASE_URL=sqlite:///data/explorer.db
      - CONFIG_PATH=/app/config.toml
    depends_on:
      - api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      target: api
    command: ["csv-explorer-api", "start"]
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - DATABASE_URL=sqlite:///data/explorer.db
      - CONFIG_PATH=/app/config.toml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ui:
    build:
      context: .
      target: ui
    command: ["csv-explorer-ui", "serve"]
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8080
      - CONFIG_PATH=/app/config.toml
    depends_on:
      - api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data:
