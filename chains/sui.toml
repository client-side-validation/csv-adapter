# Sui Chain Configuration

chain_id = "sui"
chain_name = "Sui"
default_network = "mainnet"
rpc_endpoints = [
    "https://fullnode.mainnet.sui.io",
    "https://sui-mainnet.rpc.explorerum.com",
    "https://sui-mainnet.blockvision.org"
]
program_id = "0x1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"
block_explorer_urls = [
    "https://explorer.sui.io",
    "https://suivision.xyz",
    "https://suiexplorer.com"
]

# Indexing configuration
start_block = 0  # Genesis checkpoint

[custom_settings]
supports_nfts = true
supports_smart_contracts = true
account_model = "Object"
confirmation_blocks = 12
max_batch_size = 150
supported_networks = ["mainnet", "testnet", "devnet"]

# Sui-specific settings
[custom_settings.sui]
gas_budget = 10000000
max_gas_budget = 1000000000
default_gas_price = 1000
max_gas_price = 10000
transaction_timeout_ms = 30000
checkpoint_interval_ms = 3000
max_transaction_size_bytes = 30720
