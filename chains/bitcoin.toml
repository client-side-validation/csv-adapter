# Bitcoin Chain Configuration

chain_id = "bitcoin"
chain_name = "Bitcoin"
default_network = "mainnet"
rpc_endpoints = [
    "https://blockstream.info/api",
    "https://api.blockchair.com/bitcoin",
    "https://blockchain.info/api"
]
# program_id is null for Bitcoin (no smart contract program)
block_explorer_urls = [
    "https://blockstream.info",
    "https://blockchair.com/bitcoin",
    "https://blockchain.info"
]

# Indexing configuration
start_block = 0  # Genesis block

[custom_settings]
supports_nfts = true
supports_smart_contracts = false
account_model = "UTXO"
confirmation_blocks = 6
max_batch_size = 50
supported_networks = ["mainnet", "testnet", "regtest"]

# Bitcoin-specific settings
[custom_settings.bitcoin]
min_confirmations = 6
max_fee_rate = 1000
default_fee_rate = 10
dust_limit = 546
p2pkh_prefix = 0x00
p2sh_prefix = 0x05
bech32_prefix = "bc"
